<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CU FEST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;justify-content:center;font-family:'Poppins';}

.app{
  width:100%;
  max-width:420px;
  height:100vh;
  background:#fff;
  position:relative;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:20;
}
.logo{width:120px;}
.btn{padding:12px;background:#000;color:#fff;border:none;border-radius:8px;margin-top:20px;width:80%;}

/* HEADER */
.header{padding:15px;text-align:center;font-weight:600;border-bottom:1px solid #eee;}

/* PAGES */
.page{display:none;padding:15px;height:calc(100vh - 120px);overflow:auto;}
.active{display:block;}

/* CARD */
.card{background:#f5f5f5;padding:15px;margin-bottom:10px;border-radius:12px;}

/* NAV */
.nav{
  position:absolute;bottom:0;width:100%;height:60px;
  display:flex;background:#fff;border-top:1px solid #eee;
}
.nav button{flex:1;border:none;background:none;}

/* ADMIN SIDEBAR */
.sidebar{
  position:absolute;left:-100%;top:0;width:70%;height:100%;
  background:#111;color:#fff;padding:20px;transition:0.3s;
  z-index:10;
}
.sidebar.open{left:0;}
.sidebar div{margin:15px 0;cursor:pointer;}

.menu-btn{
  background:none;border:none;font-size:20px;
}

/* LOGIN */
#login{display:flex;height:100%;justify-content:center;align-items:center;}
.login-box{width:80%;}
input,textarea{
  width:100%;padding:10px;margin:5px 0;
  border-radius:8px;border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="app">

<!-- SPLASH -->
<div id="splash">
  <img src="logo.png" class="logo">
  <h2>CU FEST</h2>
  <button class="btn" onclick="enterApp()">Enter</button>
</div>

<!-- HEADER -->
<div class="header">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  CU FEST
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <div onclick="adminSection('dashboard')">Dashboard</div>
  <div onclick="adminSection('venues')">Venues</div>
  <div onclick="adminSection('media')">Highlights</div>
  <div onclick="adminSection('scores')">Scores</div>
  <div onclick="adminSection('winners')">Winners</div>
</div>

<!-- USER PAGES -->

<div id="leaderboard" class="page active">
<h3>🏆 Leaderboard</h3>
<div id="board"></div>
</div>

<div id="venues" class="page">
<h3>📍 Venues</h3>
<div id="venueList"></div>
</div>

<div id="venueDetail" class="page">
<h3 id="venueTitle"></h3>
<p id="venueInfo"></p>
</div>

<div id="highlights" class="page">
<h3>🎬 Highlights</h3>
<div id="media"></div>
</div>

<div id="winners" class="page">
<h3>🥇 Winners</h3>
<div id="winnerList"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">

<div id="login">
  <div class="login-box">
    <input id="adminUser" placeholder="Admin Name">
    <input id="adminPass" type="password" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<div id="adminPanel" style="display:none;">
  <div id="adminContent"></div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('leaderboard')">🏆</button>
<button onclick="show('venues')">📍</button>
<button onclick="show('highlights')">🎬</button>
<button onclick="show('winners')">🥇</button>
<button onclick="show('admin')">⚙️</button>
</div>

</div>

<script>
/* FIREBASE */
const firebaseConfig={
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_ID"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* SPLASH */
function enterApp(){
  document.getElementById("splash").style.display="none";
}

/* NAV */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* LOGIN */
function login(){
  let u=adminUser.value;
  let p=adminPass.value;

  if(u==="Hiten" && p==="1234"){
    login.style.display="none";
    adminPanel.style.display="block";
    adminSection('dashboard'); // DEFAULT VIEW
  }else{
    alert("Wrong credentials");
  }
}

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

/* ADMIN SECTIONS */
function adminSection(type){
  let c=document.getElementById("adminContent");

  if(type==="dashboard"){
    c.innerHTML=`<h3>Welcome Hiten 👋</h3><p>Manage your fest from here.</p>`;
  }

  if(type==="venues"){
    c.innerHTML=`
      <input id="vname" placeholder="Venue Name">
      <textarea id="vinfo" placeholder="Details"></textarea>
      <button class="btn" onclick="addVenue()">Add Venue</button>`;
  }

  if(type==="media"){
    c.innerHTML=`
      <input id="mediaUrl" placeholder="Image URL">
      <button class="btn" onclick="addMedia()">Add</button>`;
  }

  if(type==="scores"){
    c.innerHTML=`
      <input id="team" placeholder="Team Name">
      <input id="score" type="number" placeholder="Score">
      <button class="btn" onclick="addScore()">Update</button>`;
  }

  if(type==="winners"){
    c.innerHTML=`
      <input id="winner" placeholder="Winner Name">
      <button class="btn" onclick="addWinner()">Add</button>`;
  }

  toggleSidebar();
}

/* FIREBASE FUNCTIONS */
function addVenue(){
  db.collection("venues").add({name:vname.value,info:vinfo.value});
}

function addMedia(){
  db.collection("media").add({url:mediaUrl.value});
}

function addScore(){
  db.collection("teams").doc(team.value).set({name:team.value,score:parseInt(score.value)});
}

function addWinner(){
  db.collection("winners").add({name:winner.value});
}

/* LOAD DATA */

// leaderboard
db.collection("teams").onSnapshot(s=>{
  let b=board; b.innerHTML="";
  let arr=[];
  s.forEach(d=>arr.push(d.data()));
  arr.sort((a,b)=>b.score-a.score);
  arr.forEach((t,i)=>{
    b.innerHTML+=`<div class="card">#${i+1} ${t.name} - ${t.score}</div>`;
  });
});

// venues
db.collection("venues").onSnapshot(s=>{
  let v=venueList; v.innerHTML="";
  s.forEach(d=>{
    let data=d.data();
    v.innerHTML+=`<div class="card" onclick="openVenue('${data.name}','${data.info}')">${data.name}</div>`;
  });
});

function openVenue(name,info){
  show('venueDetail');
  venueTitle.innerText=name;
  venueInfo.innerText=info;
}

// media
db.collection("media").onSnapshot(s=>{
  let m=media; m.innerHTML="";
  s.forEach(d=>{
    m.innerHTML+=`<div class="card"><img src="${d.data().url}" width="100%"></div>`;
  });
});

// winners
db.collection("winners").onSnapshot(s=>{
  let w=winnerList; w.innerHTML="";
  s.forEach(d=>{
    w.innerHTML+=`<div class="card">${d.data().name}</div>`;
  });
});
</script>

</body>
</html>
