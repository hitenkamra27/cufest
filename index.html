<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CU FEST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;justify-content:center;font-family:'Poppins';}

.app{
  width:100%;
  max-width:420px;
  height:100vh;
  background:#fff;
  position:relative;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:20;
}

.logo{width:120px;}

.loader{
  width:150px;height:4px;background:#ddd;margin-top:20px;
  border-radius:10px;overflow:hidden;
}
.loader span{
  display:block;height:100%;width:0%;background:#000;
  animation:load 2.5s forwards;
}
@keyframes load{to{width:100%;}}

/* HEADER */
.header{padding:15px;text-align:center;font-weight:600;border-bottom:1px solid #eee;}

.page{display:none;padding:15px;height:calc(100vh - 120px);overflow:auto;}
.active{display:block;}

.card{background:#f5f5f5;padding:15px;margin-bottom:10px;border-radius:12px;}

.nav{
  position:absolute;bottom:0;width:100%;height:60px;
  display:flex;background:#fff;border-top:1px solid #eee;
}
.nav button{flex:1;border:none;background:none;}

input,textarea{
  width:100%;padding:10px;margin:5px 0;
  border-radius:8px;border:1px solid #ddd;
}

.btn{
  padding:10px;background:#000;color:#fff;
  border:none;border-radius:8px;margin-top:10px;width:100%;
}

.sidebar{
  position:absolute;left:-100%;top:0;width:70%;height:100%;
  background:#111;color:#fff;padding:20px;transition:0.3s;
}
.sidebar.open{left:0;}
.sidebar div{margin:15px 0;cursor:pointer;}
</style>
</head>

<body>

<div class="app">

<!-- SPLASH -->
<div id="splash">
  <img src="logo.png" class="logo">
  <h2>CU FEST</h2>
  <div class="loader"><span></span></div>
</div>

<div class="header">CU FEST</div>

<!-- PAGES -->
<div id="leaderboard" class="page active">
<h3>🏆 Leaderboard</h3>
<div id="board"></div>
</div>

<div id="admin" class="page">

<!-- LOGIN -->
<div id="loginBox">
  <input id="adminUser" placeholder="Admin Name">
  <input id="adminPass" type="password" placeholder="Password">
  <button class="btn" onclick="handleLogin()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
<button class="btn" onclick="toggleSidebar()">☰ Menu</button>

<div id="adminSidebar" class="sidebar">
  <div onclick="loadDashboard()">Dashboard</div>
  <div onclick="loadSection('admins')">Add Admin</div>
  <div onclick="loadSection('venues')">Venues</div>
  <div onclick="loadSection('media')">Highlights</div>
  <div onclick="loadSection('winners')">Winners</div>
</div>

<div id="adminContent"></div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('leaderboard')">🏆</button>
<button onclick="show('admin')">⚙️</button>
</div>

</div>

<script>

/* SPLASH */
setTimeout(()=>{document.getElementById("splash").style.display="none";},2000);

/* NAV */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ✅ FIXED LOGIN */
function handleLogin(){
  const user = document.getElementById("adminUser").value.trim();
  const pass = document.getElementById("adminPass").value.trim();

  if(user === "Hiten" && pass === "1234"){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadDashboard();
  } else {
    alert("Invalid credentials");
  }
}

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("adminSidebar").classList.toggle("open");
}

/* DASHBOARD */
function loadDashboard(){
  document.getElementById("adminContent").innerHTML = `
    <h3>Welcome Hiten 👋</h3>
    <p>Admin panel is working correctly.</p>
  `;
}

/* SECTIONS */
function loadSection(type){
  let c=document.getElementById("adminContent");

  if(type==="admins"){
    c.innerHTML=`<input placeholder="Name"><input placeholder="Password"><button class="btn">Add</button>`;
  }

  if(type==="venues"){
    c.innerHTML=`<input placeholder="Venue"><textarea placeholder="Details"></textarea><button class="btn">Add</button>`;
  }

  if(type==="media"){
    c.innerHTML=`<input placeholder="Image URL"><button class="btn">Add</button>`;
  }

  if(type==="winners"){
    c.innerHTML=`<input placeholder="Winner"><button class="btn">Add</button>`;
  }

  toggleSidebar();
}

/* 🔥 GOOGLE SHEET LEADERBOARD */
async function loadLeaderboard(){
  const res = await fetch("https://sheetdb.io/api/v1/w9e5b0g16a5lw");
  const data = await res.json();

  const board = document.getElementById("board");
  board.innerHTML="";

  data.sort((a,b)=>parseInt(b.score)-parseInt(a.score));

  data.forEach((t,i)=>{
    board.innerHTML += `
      <div class="card">
        #${i+1} ${t.name}<br>Score: ${t.score}
      </div>`;
  });
}

setInterval(loadLeaderboard,3000);
loadLeaderboard();

</script>

</body>
</html>
