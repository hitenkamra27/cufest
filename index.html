<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CU Fest Live Scoreboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: 600;
  background: linear-gradient(90deg,#8b5cf6,#22c55e);
  -webkit-background-clip: text;
  color: transparent;
}

/* TOP 3 PODIUM */
.top3 {
  display: flex;
  justify-content: center;
  align-items: end;
  gap: 10px;
  margin: 20px;
}

.podium {
  text-align: center;
}

.podium .circle {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg,#8b5cf6,#22c55e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.first .circle {
  width: 100px;
  height: 100px;
  box-shadow: 0 0 20px gold;
}

.rank-label {
  margin-top: 8px;
  font-size: 14px;
}

/* LIST */
.list {
  padding: 20px;
}

.card {
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
}

.left {
  display: flex;
  flex-direction: column;
}

.points {
  font-weight: bold;
}

/* LIVE BADGE */
.live {
  color: #22c55e;
  font-size: 12px;
}

</style>
</head>

<body>

<div class="header">🏆 CU FEST LIVE SCOREBOARD</div>

<div class="top3" id="top3"></div>

<div class="list" id="list"></div>

<script>
const API_URL = "https://sheetdb.io/api/v1/w9e5b0g16a5lw";

async function fetchData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const totals = {};

  data.forEach(item => {
    const dept = item.Department;
    const points = parseInt(item.Points) || 0;

    if (!totals[dept]) {
      totals[dept] = {
        points: 0,
        live: item.LiveScore,
        venue: item.Venue
      };
    }

    totals[dept].points += points;
  });

  const sorted = Object.entries(totals)
    .sort((a,b)=>b[1].points-a[1].points);

  renderTop3(sorted);
  renderList(sorted.slice(3));
}

function renderTop3(data) {
  const container = document.getElementById("top3");
  container.innerHTML = "";

  const positions = ["second","first","third"];

  [1,0,2].forEach((i,index)=>{
    if(!data[i]) return;

    const div = document.createElement("div");
    div.className = `podium ${positions[index]}`;

    div.innerHTML = `
      <div class="circle">${data[i][0].charAt(0)}</div>
      <div class="rank-label">#${i+1} ${data[i][0]}</div>
      <div>${data[i][1].points} pts</div>
    `;

    container.appendChild(div);
  });
}

function renderList(data) {
  const container = document.getElementById("list");
  container.innerHTML = "";

  data.forEach(([dept,info],index)=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="left">
        <div>#${index+4} ${dept}</div>
        <div class="live">Live: ${info.live} • ${info.venue}</div>
      </div>
      <div class="points">${info.points}</div>
    `;

    container.appendChild(div);
  });
}

fetchData();
setInterval(fetchData,4000);
</script>

</body>
</html>
