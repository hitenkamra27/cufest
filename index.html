<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CU FEST</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>


<style>
/* ── RESET & VARIABLES ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:        #0a0a0f;
  --surface:   #13131c;
  --surface2:  #1c1c2e;
  --border:    #2a2a3e;
  --accent:    #f0c040;
  --accent2:   #ff6b35;
  --text:      #f0f0f8;
  --muted:     #7a7a9a;
  --success:   #4ade80;
  --radius:    14px;
  --nav-h:     64px;
  --header-h:  56px;
}

body {
  background: var(--bg);
  display: flex;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

.app {
  width: 100%;
  max-width: 430px;
  height: 100vh;
  background: var(--bg);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── SPLASH ── */
#splash {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  gap: 16px;
  transition: opacity 0.5s ease;
}
#splash.hidden { opacity: 0; pointer-events: none; }

.splash-logo {
  width: 90px;
  height: 90px;
  border-radius: 24px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 28px;
  color: #000;
  letter-spacing: -1px;
  box-shadow: 0 0 40px rgba(240,192,64,0.4);
  animation: pulse 1.5s ease infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 40px rgba(240,192,64,0.4); }
  50%      { box-shadow: 0 0 70px rgba(240,192,64,0.7); }
}

.splash-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 32px;
  letter-spacing: -1px;
  color: var(--text);
}

.splash-sub {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.progress-track {
  width: 160px;
  height: 3px;
  background: var(--surface2);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-fill {
  height: 100%;
  width: 0;
  background: var(--accent);
  border-radius: 10px;
  animation: fill 2s ease forwards;
}
@keyframes fill { to { width: 100%; } }

/* ── HEADER ── */
.header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-brand {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.5px;
  color: var(--accent);
}
.header-live {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--success);
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--success);
  animation: blink 1.2s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

/* ── PAGES ── */
.pages {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.page {
  display: none;
  height: 100%;
  overflow-y: auto;
  padding: 16px;
  padding-bottom: 80px;
  animation: fadeIn 0.25s ease;
}
.page.active { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }

/* scrollbar */
.page::-webkit-scrollbar { width: 4px; }
.page::-webkit-scrollbar-track { background: transparent; }
.page::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

/* ── PAGE TITLES ── */
.page-title {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 16px;
  color: var(--text);
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
}

/* ── SEARCH ── */
.search-wrap {
  position: relative;
  margin-bottom: 14px;
}
.search-wrap span {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  pointer-events: none;
}
#searchInput {
  width: 100%;
  padding: 11px 12px 11px 34px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
#searchInput:focus { border-color: var(--accent); }
#searchInput::placeholder { color: var(--muted); }

/* ── PODIUM ── */
.podium {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 10px;
  margin-bottom: 24px;
  padding: 16px 0;
}

.podium-item {
  flex: 1;
  text-align: center;
  cursor: pointer;
  position: relative;
  padding: 12px 6px;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--border);
  transition: transform 0.2s, border-color 0.2s;
}
.podium-item:hover { transform: translateY(-3px); border-color: var(--accent); }

.podium-item.rank-1 {
  transform: scale(1.06);
  border-color: var(--accent);
  background: linear-gradient(160deg, #1c1c10, #1c1c2e);
  box-shadow: 0 0 24px rgba(240,192,64,0.15);
}
.podium-item.rank-1:hover { transform: scale(1.06) translateY(-3px); }

.crown {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
}

.avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 18px;
  color: var(--accent);
  margin: 0 auto 6px;
  border: 2px solid var(--border);
}
.rank-1 .avatar { border-color: var(--accent); }

.podium-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 3px;
  word-break: break-word;
}

.podium-pts {
  font-size: 10px;
  color: var(--accent);
  font-weight: 600;
}

.rank-num {
  display: inline-block;
  width: 20px;
  height: 20px;
  background: var(--accent);
  color: #000;
  border-radius: 50%;
  font-size: 10px;
  font-weight: 800;
  line-height: 20px;
  margin-top: 5px;
}
.rank-1 .rank-num { background: var(--accent); }
.rank-2 .rank-num, .rank-3 .rank-num { background: var(--surface2); color: var(--muted); }

/* ── LIST CARDS (rank 4+) ── */
.list-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}
.list-card:hover { border-color: var(--accent); transform: translateX(3px); }
.list-card .rank-label {
  font-size: 12px;
  color: var(--muted);
  margin-right: 10px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
}
.list-card .team-name { font-size: 14px; font-weight: 500; flex: 1; }
.list-card .pts-badge {
  font-size: 12px;
  color: var(--accent);
  font-weight: 700;
  background: rgba(240,192,64,0.1);
  padding: 3px 8px;
  border-radius: 20px;
}

/* ── SECTION TITLE ── */
.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 10px;
  font-weight: 600;
}

/* ── DETAIL CARDS ── */
.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: var(--surface2);
  border-radius: 10px;
  margin-bottom: 8px;
  font-size: 13px;
}
.detail-row .cat { color: var(--muted); }
.detail-row .pts { color: var(--accent); font-weight: 700; }

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 16px;
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.2s;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }

.total-score {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #000;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 28px;
  text-align: center;
  padding: 18px;
  border-radius: var(--radius);
  margin-bottom: 16px;
}
.total-score small { display: block; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; margin-bottom: 4px; }

/* ── VENUES ── */
.venue-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.venue-card:hover { border-color: var(--accent2); transform: translateX(3px); }
.venue-icon { font-size: 24px; }
.venue-name { font-weight: 600; font-size: 15px; }

.venue-detail-info {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--muted);
  white-space: pre-wrap;
}

/* ── MEDIA ── */
.media-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.media-item {
  border-radius: var(--radius);
  overflow: hidden;
  aspect-ratio: 1;
  background: var(--surface);
}
.media-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s;
}
.media-item:hover img { transform: scale(1.05); }

/* ── WINNERS ── */
.winner-card {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  animation: fadeIn 0.3s ease both;
}
.winner-medal { font-size: 26px; }
.winner-name { font-weight: 600; font-size: 14px; }
.winner-sub { font-size: 12px; color: var(--muted); }

/* ── NAV ── */
.nav {
  height: var(--nav-h);
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  border: none;
  background: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  font-size: 18px;
  color: var(--muted);
  transition: color 0.2s;
  position: relative;
}
.nav-btn span {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
}
.nav-btn.active { color: var(--accent); }
.nav-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  width: 24px;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
}

/* ── ADMIN ── */
.admin-form input,
.admin-form textarea,
.admin-form select {
  width: 100%;
  padding: 11px 13px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}
.admin-form input:focus,
.admin-form textarea:focus { border-color: var(--accent); }
.admin-form textarea { min-height: 80px; resize: vertical; }

.btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 10px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.98); }
.btn-outline {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  margin-bottom: 8px;
}

.admin-menu {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.menu-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 12px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}
.menu-tile:hover { border-color: var(--accent); transform: translateY(-2px); }
.menu-tile .tile-icon { font-size: 26px; margin-bottom: 6px; }
.menu-tile .tile-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

.success-msg {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(74,222,128,0.1);
  border: 1px solid rgba(74,222,128,0.3);
  color: var(--success);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  margin-top: 10px;
}

.admin-section-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 14px;
}
.empty .e-icon { font-size: 40px; margin-bottom: 10px; }

/* ── LOADING ── */
.loading {
  text-align: center;
  padding: 30px;
  color: var(--muted);
  font-size: 13px;
}
.spinner {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>

<body>
<div class="app">

  <!-- ── SPLASH ── -->
  <div id="splash">
    <div class="splash-logo">CU</div>
    <div class="splash-title">CU FEST</div>
    <div class="splash-sub">University Festival</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
  </div>

  <!-- ── HEADER ── -->
  <div class="header">
    <div class="header-brand">CU FEST</div>
    <div class="header-live"><div class="live-dot"></div>Live</div>
  </div>

  <!-- ── PAGES ── -->
  <div class="pages">

    <!-- LEADERBOARD -->
    <div id="leaderboard" class="page active">
      <div class="page-title">🏆 Leaderboard</div>
      <div class="search-wrap">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search department…" oninput="searchTeam()">
      </div>
      <div id="board"><div class="loading"><div class="spinner"></div>Loading scores…</div></div>
    </div>

    <!-- TEAM DETAIL -->
    <div id="teamDetail" class="page">
      <button class="back-btn" onclick="show('leaderboard')">← Back to Leaderboard</button>
      <div class="total-score">
        <small>Total Score</small>
        <span id="detailPoints">0</span> pts
      </div>
      <div class="page-title" id="detailName"></div>
      <div class="section-label">Event Breakdown</div>
      <div id="categoryList"></div>
    </div>

    <!-- VENUES -->
    <div id="venues" class="page">
      <div class="page-title">📍 Venues</div>
      <div id="venueList"><div class="loading"><div class="spinner"></div>Loading venues…</div></div>
    </div>

    <!-- VENUE DETAIL -->
    <div id="venueDetail" class="page">
      <button class="back-btn" onclick="show('venues')">← Back to Venues</button>
      <div class="page-title" id="venueTitle"></div>
      <div class="venue-detail-info" id="venueInfo"></div>
    </div>

    <!-- HIGHLIGHTS -->
    <div id="highlights" class="page">
      <div class="page-title">🎬 Highlights</div>
      <div id="media" class="media-grid"></div>
    </div>

    <!-- WINNERS -->
    <div id="winners" class="page">
      <div class="page-title">🥇 Winners</div>
      <div id="winnerList"></div>
    </div>

    <!-- ADMIN -->
    <div id="admin" class="page">

      <!-- LOGIN BOX -->
      <div id="loginBox">
        <div class="page-title">⚙️ Admin Login</div>
        <div class="admin-form">
          <input id="adminUser" placeholder="Admin username" autocomplete="off">
          <input id="adminPass" type="password" placeholder="Password">
          <button class="btn" onclick="handleLogin()">Login</button>
          <div id="loginErr" style="color:#ff6b6b;font-size:13px;margin-top:8px;"></div>
        </div>
      </div>

      <!-- ADMIN PANEL -->
      <div id="adminPanel" style="display:none;">
        <div class="page-title">Welcome, Hiten 👋</div>
        <div class="admin-menu">
          <div class="menu-tile" onclick="loadSection('venues')">
            <div class="tile-icon">📍</div>
            <div class="tile-label">Add Venue</div>
          </div>
          <div class="menu-tile" onclick="loadSection('media')">
            <div class="tile-icon">🎬</div>
            <div class="tile-label">Upload Media</div>
          </div>
          <div class="menu-tile" onclick="loadSection('winners')">
            <div class="tile-icon">🏆</div>
            <div class="tile-label">Add Winner</div>
          </div>
          <div class="menu-tile" onclick="loadSection('admins')">
            <div class="tile-icon">👤</div>
            <div class="tile-label">Add Admin</div>
          </div>
        </div>

        <div id="adminContent"></div>

        <button class="btn btn-outline" onclick="logout()">Sign Out</button>
      </div>

    </div>
  </div>
  <!-- /pages -->

  <!-- ── NAV ── -->
  <nav class="nav">
    <button class="nav-btn active" id="nav-leaderboard" onclick="show('leaderboard')">🏆<span>Board</span></button>
    <button class="nav-btn" id="nav-venues"      onclick="show('venues')">📍<span>Venues</span></button>
    <button class="nav-btn" id="nav-highlights"  onclick="show('highlights')">🎬<span>Media</span></button>
    <button class="nav-btn" id="nav-winners"     onclick="show('winners')">🥇<span>Winners</span></button>
    <button class="nav-btn" id="nav-admin"       onclick="show('admin')">⚙️<span>Admin</span></button>
  </nav>

</div><!-- /app -->


<script>
/* ════════════════════════════════
   SPLASH
════════════════════════════════ */
setTimeout(() => {
  const s = document.getElementById('splash');
  s.classList.add('hidden');
  setTimeout(() => s.style.display = 'none', 500);
}, 2200);


/* ════════════════════════════════
   NAVIGATION
════════════════════════════════ */
// Pages that should NOT trigger the nav highlight
const navlessPages = ['teamDetail', 'venueDetail'];

function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  // update nav highlight only for main pages
  if (!navlessPages.includes(id)) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('nav-' + id);
    if (btn) btn.classList.add('active');
  }
}

   LEADERBOARD (Google Sheets via opensheet)
════════════════════════════════ */
const SHEET_URL = "https://opensheet.elk.sh/12gNBBNZpqbkVyKJBzEQUwF-HXu1moQjXBE7SyezUt8k/Sheet1";

let allTeams = []; // cache for search

async function loadLeaderboard() {
  try {
    const res  = await fetch(SHEET_URL);
    const data = await res.json();

    // Group points by department
    const grouped = {};
    data.forEach(row => {
      const dept = (row.Department || '').trim();
      const pts  = parseInt(row.Points || 0);
      if (!dept) return;
      grouped[dept] = (grouped[dept] || 0) + pts;
    });

    allTeams = Object.entries(grouped)
      .map(([name, total]) => ({ name, total }))
      .sort((a, b) => b.total - a.total);

    renderBoard(allTeams);
  } catch (err) {
    console.error("Leaderboard error:", err);
    document.getElementById('board').innerHTML =
      '<div class="empty"><div class="e-icon">⚠️</div>Could not load leaderboard</div>';
  }
}

function renderBoard(teams) {
  const board = document.getElementById('board');
  if (!teams.length) {
    board.innerHTML = '<div class="empty"><div class="e-icon">📊</div>No data yet</div>';
    return;
  }

  const top3 = teams.slice(0, 3);
  const rest  = teams.slice(3);

  // ── Podium (order: 2nd, 1st, 3rd) ──
  const podiumOrder = [top3[1], top3[0], top3[2]];
  const rankClasses = ['rank-2', 'rank-1', 'rank-3'];
  const rankNums    = [2, 1, 3];

  let podiumHTML = '<div class="podium">';
  podiumOrder.forEach((team, i) => {
    if (!team) { podiumHTML += '<div style="flex:1"></div>'; return; }
    const rn = rankNums[i];
    podiumHTML += `
      <div class="podium-item ${rankClasses[i]}" onclick="openDetails('${escHtml(team.name)}')">
        ${rn === 1 ? '<div class="crown">👑</div>' : ''}
        <div class="avatar">${team.name.charAt(0).toUpperCase()}</div>
        <div class="podium-name">${escHtml(team.name)}</div>
        <div class="podium-pts">${team.total} pts</div>
        <div class="rank-num">${rn}</div>
      </div>`;
  });
  podiumHTML += '</div>';

  // ── Remaining list ──
  let listHTML = '';
  if (rest.length) {
    listHTML += '<div class="section-label">Rankings</div>';
    rest.forEach((team, i) => {
      listHTML += `
        <div class="list-card" onclick="openDetails('${escHtml(team.name)}')">
          <span class="rank-label">#${i + 4}</span>
          <span class="team-name">${escHtml(team.name)}</span>
          <span class="pts-badge">${team.total} pts</span>
        </div>`;
    });
  }

  board.innerHTML = podiumHTML + listHTML;
}

// ── Search ──
function searchTeam() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { renderBoard(allTeams); return; }
  renderBoard(allTeams.filter(t => t.name.toLowerCase().includes(q)));
}

// ── Team Detail ──
function openDetails(name) {
  fetch(SHEET_URL)
    .then(r => r.json())
    .then(data => {
      const filtered = data.filter(d => (d.Department || '').trim() === name);
      let total = 0;
      let html  = '';

      filtered.forEach(item => {
        const pts = parseInt(item.Points || 0);
        total += pts;
        html += `
          <div class="detail-row">
            <span class="cat">${escHtml(item.Category || 'Unnamed')}</span>
            <span class="pts">${pts} pts</span>
          </div>`;
      });

      if (!html) html = '<div class="empty"><div class="e-icon">📂</div>No category data found</div>';

      document.getElementById('detailName').textContent   = name;
      document.getElementById('detailPoints').textContent = total;
      document.getElementById('categoryList').innerHTML   = html;
      show('teamDetail');
    })
    .catch(() => alert('Could not load team details'));
}

async function handleLogin(){
  const u = document.getElementById('adminUser').value.trim();
  const p = document.getElementById('adminPass').value;
  const err = document.getElementById('loginErr');

  if(!u || !p){
    err.textContent = "Enter username & password";
    return;
  }

  try{
    const { data, error } = await supabase
      .from("admins")
      .select("*")
      .eq("name", u)
      .eq("pass", p);

    if(error){
      console.error(error);
      err.textContent = "Login error";
      return;
    }

    if(data.length){
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      err.textContent = "";
    } else {
      err.textContent = "❌ Wrong username or password";
    }

  }catch(e){
    console.error(e);
    err.textContent = "Login error";
  }
}

/* ── Cloudinary Upload ── */
function uploadImage() {
  const fileInput = document.getElementById('fileInput');
  const file = fileInput.files[0];
  if (!file) { alert('Please select an image first'); return; }

  const msg = document.getElementById('msg');
  msg.innerHTML = '<div class="loading"><div class="spinner"></div>Uploading…</div>';

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', 'CU FEST UPLOAD'); // ← Replace with your Cloudinary preset

  fetch('https://api.cloudinary.com/v1_1/dyt6iai2c/image/upload', {
    method: 'POST',
    body: formData
  })
  .then(r => r.json())
  .then(data => {
    if (data.secure_url) {
      return db.collection('media').add({ url: data.secure_url, type: 'image' })
        .then(() => {
          showMsg('Image uploaded successfully');
          fileInput.value = '';
        });
    } else {
      throw new Error('Upload failed — check your Cloudinary preset name');
    }
  })
  .catch(err => {
    console.error(err);
    msg.innerHTML = `<div style="color:#ff6b6b;font-size:13px;margin-top:8px;">❌ ${err.message}</div>`;
  });
}

// Escape HTML to prevent XSS
function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
