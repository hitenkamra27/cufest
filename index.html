<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CU FEST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;justify-content:center;font-family:'Poppins';}

.app{width:100%;max-width:420px;height:100vh;background:#fff;position:relative;overflow:hidden;}

#splash{
  position:absolute;width:100%;height:100%;background:#fff;
  display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10;
}
.logo{width:120px;}
.loader{width:150px;height:4px;background:#ddd;margin-top:20px;border-radius:10px;overflow:hidden;}
.loader span{display:block;height:100%;width:0;background:#000;animation:load 2s forwards;}
@keyframes load{to{width:100%;}}

.header{padding:15px;text-align:center;font-weight:600;border-bottom:1px solid #eee;}

.page{display:none;padding:15px;height:calc(100vh - 120px);overflow:auto;}
.active{display:block;}

.card{background:#f5f5f5;padding:15px;margin-bottom:10px;border-radius:12px;}

.nav{position:absolute;bottom:0;width:100%;height:60px;display:flex;background:#fff;border-top:1px solid #eee;}
.nav button{flex:1;border:none;background:none;}

input,textarea{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ddd;}
.btn{padding:10px;background:#000;color:#fff;border:none;border-radius:8px;margin-top:10px;width:100%;}

.sidebar{
  position:absolute;left:-100%;top:0;width:70%;height:100%;
  background:#111;color:#fff;padding:20px;transition:0.3s;
}
.sidebar.open{left:0;}
.sidebar div{margin:15px 0;cursor:pointer;}

.success{color:green;margin-top:10px;}
/* 🔥 PODIUM UPGRADE */
.podium{
  display:flex;
  justify-content:space-around;
  align-items:flex-end;
  margin-bottom:25px;
}

.podium-item{
  text-align:center;
  cursor:pointer;
  position:relative;
}

.podium-item .logo-circle{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  margin:auto;
  margin-bottom:5px;
}

.first{
  transform:scale(1.2);
}

.crown{
  position:absolute;
  top:-18px;
  left:50%;
  transform:translateX(-50%);
  font-size:18px;
}

.rank-badge{
  background:#000;
  color:#fff;
  border-radius:50%;
  width:25px;
  height:25px;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:auto;
  margin-top:5px;
}

.list-card{
  background:linear-gradient(135deg,#6a5af9,#8b7cf6);
  color:#fff;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<!-- SPLASH -->
<div id="splash">
<img src="logo.png" class="logo">
<h2>CU FEST</h2>
<div class="loader"><span></span></div>
</div>

<div class="header">CU FEST</div>

<!-- PAGES -->

<div id="leaderboard" class="page active">
<h3>🏆 Leaderboard</h3>
<div id="board"></div>
</div>

<div id="venues" class="page">
<h3>📍 Venues</h3>
<div id="venueList"></div>
</div>

<div id="venueDetail" class="page">
<h3 id="venueTitle"></h3>
<p id="venueInfo"></p>
</div>

<div id="highlights" class="page">
<h3>🎬 Event Highlights</h3>
<div id="media"></div>
</div>

<div id="winners" class="page">
<h3>🥇 Winners</h3>
<div id="winnerList"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">

<div id="loginBox">
<input id="adminUser" placeholder="Admin Name">
<input id="adminPass" type="password" placeholder="Password">
<button class="btn" onclick="handleLogin()">Login</button>
</div>

<div id="adminPanel" style="display:none;">

<button class="btn" onclick="toggleSidebar()">☰ Menu</button>
<button class="btn" onclick="logout()">Sign Out</button>

<div id="adminSidebar" class="sidebar">
<div onclick="loadDashboard()">Dashboard</div>
<div onclick="loadSection('admins')">Add Admin</div>
<div onclick="loadSection('venues')">Add Venue</div>
<div onclick="loadSection('media')">Upload Highlight</div>
<div onclick="loadSection('winners')">Add Winner</div>
</div>

<div id="adminContent"></div>

</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('leaderboard')">🏆</button>
<button onclick="show('venues')">📍</button>
<button onclick="show('highlights')">🎬</button>
<button onclick="show('winners')">🥇</button>
<button onclick="show('admin')">⚙️</button>
</div>

</div>

<script>

/* SPLASH */
setTimeout(()=>{splash.style.display="none";},2000);

/* NAV */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* LOGIN */
function handleLogin(){
if(adminUser.value==="Hiten" && adminPass.value==="1234"){
loginBox.style.display="none";
adminPanel.style.display="block";
loadDashboard();
}else alert("Wrong credentials");
}

function logout(){
adminPanel.style.display="none";
loginBox.style.display="block";
}

/* SIDEBAR */
function toggleSidebar(){adminSidebar.classList.toggle("open");}

/* DASHBOARD */
function loadDashboard(){
adminContent.innerHTML="<h3>Welcome Hiten 👋</h3>";
}

/* FIREBASE */
const firebaseConfig={
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_ID"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* ADMIN SECTIONS */
function loadSection(type){
let c=adminContent;

if(type==="admins"){
c.innerHTML=`<input id="newAdmin"><input id="newPass"><button class="btn" onclick="addAdmin()">Add</button><div id="msg"></div>`;
}

if(type==="venues"){
c.innerHTML=`<input id="vname"><textarea id="vinfo"></textarea><button class="btn" onclick="addVenue()">Add</button><div id="msg"></div>`;
}

if(type==="media"){
c.innerHTML=`
<input type="file" id="fileInput">
<button class="btn" onclick="uploadImage()">Upload</button>
<div id="msg"></div>`;
}

if(type==="winners"){
c.innerHTML=`<input id="winner"><button class="btn" onclick="addWinner()">Add</button><div id="msg"></div>`;
}

toggleSidebar();
}

/* SUCCESS MESSAGE */
function showMsg(){
msg.innerHTML="<div class='success'>Data Added Successfully ✅</div>";
}

/* FIREBASE ADD */
function addAdmin(){
db.collection("admins").add({name:newAdmin.value,pass:newPass.value});
showMsg();
}

function addVenue(){
db.collection("venues").add({name:vname.value,info:vinfo.value});
showMsg();
}

function addWinner(){
db.collection("winners").add({name:winner.value});
showMsg();
}

/* 🔥 CLOUDINARY UPLOAD */
function uploadImage(){
  const fileInput = document.getElementById("fileInput");
  const file = fileInput.files[0];

  if(!file){
    alert("Please select an image first");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "CU FEST UPLOAD"); // 🔥 REPLACE WITH YOUR PRESET

  fetch("https://api.cloudinary.com/v1_1/dyt6iai2c/image/upload", {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    console.log("Cloudinary Response:", data);

    if(data.secure_url){
      // SAVE IN FIREBASE
      db.collection("media").add({
        url: data.secure_url,
        type: "image"
      });

      document.getElementById("msg").innerHTML =
        "<div class='success'>Uploaded Successfully ✅</div>";

      fileInput.value = ""; // reset
    } else {
      alert("Upload failed. Check preset.");
    }
  })
  .catch(err => {
    console.error(err);
    alert("Upload error. Check console.");
  });
}

/* LEADERBOARD */
async function loadLeaderboard(){
  const url = "https://opensheet.elk.sh/12gNBBNZpqbkVyKJBzEQUwF-HXu1moQjXBE7SyezUt8k/Sheet1";

  const res = await fetch(url);
  const data = await res.json();

  const grouped = {};

  // 🔥 GROUP BY DEPARTMENT
  data.forEach(row=>{
    const dept = row.Department;
    const pts = parseInt(row.Points || 0);

    if(!grouped[dept]){
      grouped[dept] = 0;
    }

    grouped[dept] += pts;
  });

  const teams = Object.keys(grouped).map(name=>({
    name,
    total: grouped[name]
  }));

  // SORT
  teams.sort((a,b)=>b.total - a.total);

  const board = document.getElementById("board");
  board.innerHTML = "";

  const top3 = teams.slice(0,3);

  // 🏆 PODIUM
  board.innerHTML += `
    <div class="podium">

      ${top3[1] ? `
      <div class="podium-item" onclick="openDetails('${top3[1].name}')">
        <div class="logo-circle">${top3[1].name.charAt(0)}</div>
        <div class="rank-badge">2</div>
        <div>${top3[1].name}</div>
        <small>${top3[1].total} pts</small>
      </div>` : ""}

      ${top3[0] ? `
      <div class="podium-item first" onclick="openDetails('${top3[0].name}')">
        <div class="crown">👑</div>
        <div class="logo-circle">${top3[0].name.charAt(0)}</div>
        <div class="rank-badge">1</div>
        <b>${top3[0].name}</b>
        <small>${top3[0].total} pts</small>
      </div>` : ""}

      ${top3[2] ? `
      <div class="podium-item" onclick="openDetails('${top3[2].name}')">
        <div class="logo-circle">${top3[2].name.charAt(0)}</div>
        <div class="rank-badge">3</div>
        <div>${top3[2].name}</div>
        <small>${top3[2].total} pts</small>
      </div>` : ""}

    </div>
  `;

  // 📋 REST LIST
  teams.slice(3).forEach((team,i)=>{
    board.innerHTML += `
      <div class="list-card" onclick="openDetails('${team.name}')">
        <div>#${i+4} ${team.name}</div>
        <div>${team.total} pts</div>
      </div>
    `;
  });
}

setInterval(loadLeaderboard,5000);
loadLeaderboard();
function openDetails(name){
  alert("Open details for " + name);
}

/* AUTO REFRESH */
setInterval(loadLeaderboard, 5000);
loadLeaderboard();

/* LOAD DATA */

db.collection("venues").onSnapshot(s=>{
venueList.innerHTML="";
s.forEach(d=>{
let v=d.data();
venueList.innerHTML+=`<div class="card" onclick="openVenue('${v.name}','${v.info}')">${v.name}</div>`;
});
});

function openVenue(n,i){
show('venueDetail');
venueTitle.innerText=n;
venueInfo.innerText=i;
}

db.collection("media").onSnapshot(s=>{
media.innerHTML="";
s.forEach(d=>{
media.innerHTML+=`<div class="card"><img src="${d.data().url}" width="100%"></div>`;
});
});

db.collection("winners").onSnapshot(s=>{
winnerList.innerHTML="";
s.forEach(d=>{
winnerList.innerHTML+=`<div class="card">${d.data().name}</div>`;
});
});

</script>

</body>
</html>
