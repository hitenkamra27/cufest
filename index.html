<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CU FEST LIVE SCOREBOARD</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f3f4f6;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  font-weight: 600;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 20px;
  font-weight: 600;
}

/* TABS */
.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px;
}

.tab {
  padding: 8px 18px;
  border-radius: 20px;
  background: #e5e7eb;
  font-size: 12px;
}

.active {
  background: linear-gradient(135deg,#7c3aed,#9333ea);
  color: white;
}

/* TOP 3 */
.top3 {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  margin: 20px;
  gap: 20px;
}

.player {
  text-align: center;
}

.avatar {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 3px solid #7c3aed;
  object-fit: cover;
}

.first .avatar {
  width: 90px;
  height: 90px;
  border: 4px solid gold;
}

.crown {
  font-size: 20px;
}

/* LIST HEADER */
.list-header {
  display: flex;
  justify-content: space-between;
  padding: 10px 20px;
  font-size: 12px;
  color: gray;
}

/* LIST ITEMS */
.card {
  background: linear-gradient(135deg,#7c3aed,#9333ea);
  color: white;
  margin: 10px 20px;
  padding: 12px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.small-avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}

/* BOTTOM NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid #ddd;
}

.nav div {
  font-size: 12px;
  color: gray;
}

.active-nav {
  color: #7c3aed;
}
</style>
</head>

<body>

<div class="header">
  <div>←</div>
  <div class="title">Leaderboard</div>
  <div>🔍</div>
</div>

<div class="tabs">
  <div class="tab active">Daily</div>
  <div class="tab">Monthly</div>
  <div class="tab">All time</div>
</div>

<!-- TOP 3 -->
<div class="top3" id="top3"></div>

<!-- LIST -->
<div class="list-header">
  <div>Rank</div>
  <div>Department</div>
  <div>Points</div>
</div>

<div id="list"></div>

<!-- BOTTOM NAV -->
<div class="nav">
  <div>Home</div>
  <div>Library</div>
  <div>Quiz</div>
  <div class="active-nav">Ranks</div>
  <div>Profile</div>
</div>

<script>
const API_URL = "https://sheetdb.io/api/v1/w9e5b0g16a5lw";

function avatar(name){
  return "https://ui-avatars.com/api/?name=" + name;
}

async function fetchData(){
  const res = await fetch(API_URL);
  const data = await res.json();

  const totals = {};

  data.forEach(item=>{
    if(!totals[item.Department]){
      totals[item.Department]={points:0};
    }
    totals[item.Department].points += parseInt(item.Points)||0;
  });

  const sorted = Object.entries(totals)
    .sort((a,b)=>b[1].points-a[1].points);

  renderTop3(sorted);
  renderList(sorted.slice(3));
}

function renderTop3(data){
  const container = document.getElementById("top3");
  container.innerHTML="";

  const order=[1,0,2];

  order.forEach((i,index)=>{
    if(!data[i]) return;

    const div=document.createElement("div");
    div.className="player "+(i===0?"first":"");

    div.innerHTML=`
      ${i===0?'<div class="crown">👑</div>':''}
      <img class="avatar" src="${avatar(data[i][0])}">
      <div>#${i+1}</div>
      <div>${data[i][0]}</div>
      <div>${data[i][1].points} pts</div>
    `;

    container.appendChild(div);
  });
}

function renderList(data){
  const container=document.getElementById("list");
  container.innerHTML="";

  data.forEach(([dept,info],index)=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="card-left">
        <div>${index+4}</div>
        <img class="small-avatar" src="${avatar(dept)}">
        <div>${dept}</div>
      </div>
      <div>${info.points}</div>
    `;

    container.appendChild(div);
  });
}

fetchData();
setInterval(fetchData,4000);
</script>

</body>
</html>
