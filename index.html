<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CU FEST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;justify-content:center;font-family:'Poppins';}

.app{
  width:100%;
  max-width:420px;
  height:100vh;
  background:#fff;
  position:relative;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:10;
}
.logo{width:120px;}

.loader{
  width:150px;height:4px;background:#ddd;margin-top:20px;
  border-radius:10px;overflow:hidden;
}
.loader span{
  display:block;height:100%;width:0;background:#000;
  animation:load 2s forwards;
}
@keyframes load{to{width:100%;}}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  font-weight:600;
  border-bottom:1px solid #eee;
}

/* PAGES */
.page{
  display:none;
  padding:15px;
  height:calc(100vh - 120px);
  overflow:auto;
}
.active{display:block;}

.card{
  background:#f5f5f5;
  padding:15px;
  margin-bottom:10px;
  border-radius:12px;
}

/* PODIUM */
.podium{
  display:flex;
  justify-content:space-around;
  align-items:flex-end;
  margin-bottom:20px;
}

.podium-item{
  text-align:center;
  cursor:pointer;
}

.first{
  transform:scale(1.2);
}

.rank-badge{
  background:#000;
  color:#fff;
  border-radius:50%;
  width:25px;
  height:25px;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:auto;
}

.list-card{
  background:linear-gradient(135deg,#6a5af9,#8b7cf6);
  color:#fff;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

/* DETAIL */
.detail-card{
  background:#f3f4f6;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
}

/* NAV */
.nav{
  position:absolute;
  bottom:0;
  width:100%;
  height:60px;
  display:flex;
  background:#fff;
  border-top:1px solid #eee;
}
.nav button{
  flex:1;
  border:none;
  background:none;
}
</style>
</head>

<body>

<div class="app">

<!-- SPLASH -->
<div id="splash">
  <img src="logo.png" class="logo">
  <h2>CU FEST</h2>
  <div class="loader"><span></span></div>
</div>

<div class="header">CU FEST</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="page active">
<h3>🏆 Leaderboard</h3>
<div id="board"></div>
</div>

<!-- DETAILS -->
<div id="teamDetail" class="page">
  <h3 id="detailName"></h3>
  <p><b>Total Points:</b> <span id="detailPoints"></span></p>

  <h4>Category Breakdown</h4>
  <div id="categoryList"></div>

  <button onclick="show('leaderboard')">⬅ Back</button>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('leaderboard')">🏆</button>
</div>

</div>

<script>

/* REMOVE SPLASH SAFELY */
window.onload = function(){
  document.getElementById("splash").style.display="none";
};

/* NAV */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* LEADERBOARD */
async function loadLeaderboard(){
  const url = "https://opensheet.elk.sh/12gNBBNZpqbkVyKJBzEQUwF-HXu1moQjXBE7SyezUt8k/Sheet1";

  const res = await fetch(url);
  const data = await res.json();

  const grouped = {};

  data.forEach(row=>{
    const dept = row.Department;
    const points = parseInt(row.Points || 0);

    if(!grouped[dept]){
      grouped[dept] = { total:0 };
    }

    grouped[dept].total += points;
  });

  const teams = Object.keys(grouped).map(name=>({
    name,
    total: grouped[name].total
  }));

  teams.sort((a,b)=>b.total - a.total);

  const board = document.getElementById("board");
  board.innerHTML="";

  const top3 = teams.slice(0,3);

  board.innerHTML += `
    <div class="podium">
      ${top3[1] ? `<div class="podium-item" onclick="openDetails('${top3[1].name}')">
        <div class="rank-badge">2</div>${top3[1].name}<br>${top3[1].total} pts
      </div>`:""}

      ${top3[0] ? `<div class="podium-item first" onclick="openDetails('${top3[0].name}')">
        <div class="rank-badge">1</div><b>${top3[0].name}</b><br>${top3[0].total} pts
      </div>`:""}

      ${top3[2] ? `<div class="podium-item" onclick="openDetails('${top3[2].name}')">
        <div class="rank-badge">3</div>${top3[2].name}<br>${top3[2].total} pts
      </div>`:""}
    </div>
  `;

  teams.slice(3).forEach((team,i)=>{
    board.innerHTML += `
      <div class="list-card" onclick="openDetails('${team.name}')">
        <div>#${i+4} ${team.name}</div>
        <div>${team.total} pts</div>
      </div>
    `;
  });
}

setInterval(loadLeaderboard,5000);
loadLeaderboard();

/* DETAILS */
function openDetails(name){
  const url = "https://opensheet.elk.sh/12gNBBNZpqbkVyKJBzEQUwF-HXu1moQjXBE7SyezUt8k/Sheet1";

  fetch(url)
    .then(res=>res.json())
    .then(data=>{

      const filtered = data.filter(d => d.Department === name);

      let total = 0;
      let html = "";

      filtered.forEach(item=>{
        const pts = parseInt(item.Points || 0);
        total += pts;

        html += `
          <div class="detail-card">
            ${item.Category} → ${pts} pts
          </div>`;
      });

      document.getElementById("detailName").innerText = name;
      document.getElementById("detailPoints").innerText = total;
      document.getElementById("categoryList").innerHTML = html;

      show('teamDetail');
    });
}

</script>

</body>
</html>
