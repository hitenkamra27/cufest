<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CU FEST</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:       #0a0a0f;
  --surface:  #13131c;
  --surface2: #1c1c2e;
  --border:   #2a2a3e;
  --accent:   #f0c040;
  --accent2:  #ff6b35;
  --text:     #f0f0f8;
  --muted:    #7a7a9a;
  --success:  #4ade80;
  --radius:   14px;
  --nav-h:    64px;
  --header-h: 56px;
}

body {
  background: var(--bg);
  display: flex;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

.app {
  width: 100%;
  max-width: 430px;
  height: 100vh;
  background: var(--bg);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── SPLASH ── */
#splash {
  position: absolute; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; justify-content: center;
  align-items: center; z-index: 100; gap: 16px; transition: opacity 0.5s ease;
}
#splash.hidden { opacity: 0; pointer-events: none; }

.splash-logo {
  width: 90px; height: 90px; border-radius: 24px;
  background: var(--accent); display: flex; align-items: center;
  justify-content: center; font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 28px; color: #000; letter-spacing: -1px;
  overflow: hidden; box-shadow: 0 0 40px rgba(240,192,64,0.4);
  animation: pulse 1.5s ease infinite;
}
.splash-logo img { width: 100%; height: 100%; object-fit: cover; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 40px rgba(240,192,64,0.4); }
  50%      { box-shadow: 0 0 70px rgba(240,192,64,0.7); }
}
.splash-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 32px; letter-spacing: -1px; color: var(--text); }
.splash-sub   { font-size: 13px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
.progress-track { width: 160px; height: 3px; background: var(--surface2); border-radius: 10px; overflow: hidden; margin-top: 8px; }
.progress-fill  { height: 100%; width: 0; background: var(--accent); border-radius: 10px; animation: fill 2s ease forwards; }
@keyframes fill { to { width: 100%; } }

/* ── HEADER ── */
.header {
  height: var(--header-h); display: flex; align-items: center;
  justify-content: space-between; padding: 0 18px;
  background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-logo {
  width: 34px; height: 34px; border-radius: 8px; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px;
  color: #000; overflow: hidden; flex-shrink: 0;
}
.header-logo img { width: 100%; height: 100%; object-fit: cover; }
.header-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; color: var(--accent); }
.header-live { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--success); font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); animation: blink 1.2s ease infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

/* ── PAGES ── */
.pages { flex: 1; overflow: hidden; position: relative; }
.page { display: none; height: 100%; overflow-y: auto; padding: 16px; padding-bottom: 80px; animation: fadeIn 0.25s ease; }
.page.active { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
.page::-webkit-scrollbar { width: 4px; }
.page::-webkit-scrollbar-track { background: transparent; }
.page::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.page-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 16px; color: var(--text); }

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap span { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
#searchInput {
  width: 100%; padding: 11px 12px 11px 34px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s;
}
#searchInput:focus { border-color: var(--accent); }
#searchInput::placeholder { color: var(--muted); }

/* ── PODIUM ── */
.podium { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin-bottom: 24px; padding: 16px 0; }
.podium-item {
  flex: 1; text-align: center; cursor: pointer; position: relative;
  padding: 12px 6px; border-radius: var(--radius); background: var(--surface);
  border: 1px solid var(--border); transition: transform 0.2s, border-color 0.2s;
}
.podium-item:hover { transform: translateY(-3px); border-color: var(--accent); }
.podium-item.rank-1 { transform: scale(1.06); border-color: var(--accent); background: linear-gradient(160deg, #1c1c10, #1c1c2e); box-shadow: 0 0 24px rgba(240,192,64,0.15); }
.podium-item.rank-1:hover { transform: scale(1.06) translateY(-3px); }
.crown { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 20px; }
.avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--accent); margin: 0 auto 6px; border: 2px solid var(--border); }
.rank-1 .avatar { border-color: var(--accent); }
.podium-name { font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.2; margin-bottom: 3px; word-break: break-word; }
.podium-pts  { font-size: 10px; color: var(--accent); font-weight: 600; }
.rank-num { display: inline-block; width: 20px; height: 20px; background: var(--accent); color: #000; border-radius: 50%; font-size: 10px; font-weight: 800; line-height: 20px; margin-top: 5px; }
.rank-2 .rank-num, .rank-3 .rank-num { background: var(--surface2); color: var(--muted); }

/* ── LIST CARDS ── */
.list-card { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s, transform 0.2s; }
.list-card:hover { border-color: var(--accent); transform: translateX(3px); }
.list-card .rank-label { font-size: 12px; color: var(--muted); margin-right: 10px; font-family: 'Syne', sans-serif; font-weight: 700; }
.list-card .team-name  { font-size: 14px; font-weight: 500; flex: 1; }
.list-card .pts-badge  { font-size: 12px; color: var(--accent); font-weight: 700; background: rgba(240,192,64,0.1); padding: 3px 8px; border-radius: 20px; }
.section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; font-weight: 600; }

/* ── DETAIL ── */
.detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface2); border-radius: 10px; margin-bottom: 8px; font-size: 13px; }
.detail-row .cat { color: var(--muted); }
.detail-row .pts { color: var(--accent); font-weight: 700; }
.back-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; margin-bottom: 16px; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; }
.back-btn:hover { border-color: var(--accent); color: var(--accent); }
.total-score { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; text-align: center; padding: 18px; border-radius: var(--radius); margin-bottom: 16px; }
.total-score small { display: block; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; margin-bottom: 4px; }

/* ── VENUES ── */
.venue-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s, transform 0.2s; display: flex; align-items: center; gap: 12px; }
.venue-card:hover { border-color: var(--accent2); transform: translateX(3px); }
.venue-icon { font-size: 24px; }
.venue-name { font-weight: 600; font-size: 15px; }
.venue-detail-info { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; font-size: 14px; line-height: 1.7; color: var(--muted); white-space: pre-wrap; }

/* ── MEDIA ── */
.media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.media-item { border-radius: var(--radius); overflow: hidden; aspect-ratio: 1; background: var(--surface); }
.media-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
.media-item:hover img { transform: scale(1.05); }

/* ── WINNERS ── */
.winner-card { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; animation: fadeIn 0.3s ease both; }
.winner-medal { font-size: 26px; }
.winner-name  { font-weight: 600; font-size: 14px; }
.winner-sub   { font-size: 12px; color: var(--muted); }

/* ── NAV ── */
.nav { height: var(--nav-h); display: flex; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
.nav-btn { flex: 1; border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 18px; color: var(--muted); transition: color 0.2s; position: relative; }
.nav-btn span { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; font-family: 'DM Sans', sans-serif; font-weight: 600; }
.nav-btn.active { color: var(--accent); }
.nav-btn.active::after { content:''; position:absolute; bottom:0; width:24px; height:2px; background:var(--accent); border-radius:2px 2px 0 0; }

/* ── ADMIN ── */
.admin-form input, .admin-form textarea {
  width: 100%; padding: 11px 13px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; outline: none; margin-bottom: 10px; transition: border-color 0.2s;
}
.admin-form input[type="file"] { padding: 9px 13px; cursor: pointer; }
.admin-form input:focus, .admin-form textarea:focus { border-color: var(--accent); }
.admin-form textarea { min-height: 80px; resize: vertical; }

.btn { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.98); }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--text); margin-bottom: 8px; }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }
.btn-danger { background: #ff4444; color: #fff; margin-bottom: 8px; }

.admin-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.menu-tile { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 12px; text-align: center; cursor: pointer; transition: border-color 0.2s, transform 0.2s; }
.menu-tile:hover { border-color: var(--accent); transform: translateY(-2px); }
.menu-tile .tile-icon  { font-size: 26px; margin-bottom: 6px; }
.menu-tile .tile-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

.success-msg { display:flex; align-items:center; gap:8px; background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.3); color:var(--success); padding:10px 14px; border-radius:10px; font-size:13px; margin-top:10px; }
.error-msg   { display:flex; align-items:center; gap:8px; background:rgba(255,68,68,0.1); border:1px solid rgba(255,68,68,0.3); color:#ff6b6b; padding:10px 14px; border-radius:10px; font-size:13px; margin-top:10px; }
.admin-section-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }

.logo-preview-wrap { display:flex; gap:14px; align-items:center; margin-bottom:12px; }
.logo-preview-box { width:72px; height:72px; border-radius:16px; background:var(--surface2); border:2px dashed var(--border); display:flex; align-items:center; justify-content:center; font-size:28px; overflow:hidden; flex-shrink:0; }
.logo-preview-box img { width:100%; height:100%; object-fit:cover; }
.logo-preview-info { font-size:13px; color:var(--muted); line-height:1.6; }

.empty { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }
.empty .e-icon { font-size:40px; margin-bottom:10px; }
.loading { text-align:center; padding:30px; color:var(--muted); font-size:13px; }
.spinner { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 10px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>

<body>
<div class="app">

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-logo" id="splashLogo">CU</div>
    <div class="splash-title">CU FEST</div>
    <div class="splash-sub">University Festival</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="header-brand">
      <div class="header-logo" id="headerLogo">CU</div>
      <div class="header-name">CU FEST</div>
    </div>
    <div class="header-live"><div class="live-dot"></div>Live</div>
  </div>

  <!-- PAGES -->
  <div class="pages">

    <!-- LEADERBOARD -->
    <div id="leaderboard" class="page active">
      <div class="page-title">🏆 Leaderboard</div>
      <div class="search-wrap">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search department…" oninput="searchTeam()">
      </div>
      <div id="board"><div class="loading"><div class="spinner"></div>Loading scores…</div></div>
    </div>

    <!-- TEAM DETAIL -->
    <div id="teamDetail" class="page">
      <button class="back-btn" onclick="show('leaderboard')">← Back to Leaderboard</button>
      <div class="total-score"><small>Total Score</small><span id="detailPoints">0</span> pts</div>
      <div class="page-title" id="detailName"></div>
      <div class="section-label">Event Breakdown</div>
      <div id="categoryList"></div>
    </div>

    <!-- VENUES -->
    <div id="venues" class="page">
      <div class="page-title">📍 Venues</div>
      <div id="venueList"><div class="loading"><div class="spinner"></div>Loading venues…</div></div>
    </div>

    <!-- VENUE DETAIL -->
    <div id="venueDetail" class="page">
      <button class="back-btn" onclick="show('venues')">← Back to Venues</button>
      <div class="page-title" id="venueTitle"></div>
      <div class="venue-detail-info" id="venueInfo"></div>
    </div>

    <!-- HIGHLIGHTS -->
    <div id="highlights" class="page">
      <div class="page-title">🎬 Highlights</div>
      <div id="media" class="media-grid">
        <div class="empty" style="grid-column:span 2"><div class="e-icon">🎬</div>No highlights yet</div>
      </div>
    </div>

    <!-- WINNERS -->
    <div id="winners" class="page">
      <div class="page-title">🥇 Winners</div>
      <div id="winnerList"></div>
    </div>

    <!-- ADMIN -->
    <div id="admin" class="page">

      <div id="loginBox">
        <div class="page-title">⚙️ Admin Login</div>
        <div class="admin-form">
          <input id="adminUser" placeholder="Admin username" autocomplete="off">
          <input id="adminPass" type="password" placeholder="Password" autocomplete="off">
          <button class="btn" onclick="handleLogin()">Login</button>
          <div id="loginErr" style="color:#ff6b6b;font-size:13px;margin-top:8px;"></div>
        </div>
      </div>

      <div id="adminPanel" style="display:none;">
        <div class="page-title" id="welcomeMsg">Welcome 👋</div>
        <div class="admin-menu">
          <div class="menu-tile" onclick="loadSection('logo')">
            <div class="tile-icon">🖼️</div><div class="tile-label">Upload Logo</div>
          </div>
          <div class="menu-tile" onclick="loadSection('venues')">
            <div class="tile-icon">📍</div><div class="tile-label">Add Venue</div>
          </div>
          <div class="menu-tile" onclick="loadSection('media')">
            <div class="tile-icon">🎬</div><div class="tile-label">Add Highlight</div>
          </div>
          <div class="menu-tile" onclick="loadSection('winners')">
            <div class="tile-icon">🏆</div><div class="tile-label">Add Winner</div>
          </div>
          <div class="menu-tile" onclick="loadSection('admins')">
            <div class="tile-icon">👤</div><div class="tile-label">Add Admin</div>
          </div>
          <div class="menu-tile" onclick="loadSection('deleteWinner')">
            <div class="tile-icon">🗑️</div><div class="tile-label">Delete Winner</div>
          </div>
        </div>
        <div id="adminContent"></div>
        <button class="btn btn-outline" onclick="logout()">Sign Out</button>
      </div>

    </div>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <button class="nav-btn active" id="nav-leaderboard" onclick="show('leaderboard')">🏆<span>Board</span></button>
    <button class="nav-btn"        id="nav-venues"      onclick="show('venues')">📍<span>Venues</span></button>
    <button class="nav-btn"        id="nav-highlights"  onclick="show('highlights')">🎬<span>Media</span></button>
    <button class="nav-btn"        id="nav-winners"     onclick="show('winners')">🥇<span>Winners</span></button>
    <button class="nav-btn"        id="nav-admin"       onclick="show('admin')">⚙️<span>Admin</span></button>
  </nav>

</div>

<script>
/* ══════════════════════════
   CONFIG
══════════════════════════ */
const SUPABASE_URL      = "https://nsaiepdggaakgcdabjbf.supabase.co";
const SUPABASE_ANON     = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zYWllcGRnZ2Fha2djZGFiamJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTM0MDUsImV4cCI6MjA5MDA4OTQwNX0.XHUGYYKX7TwUE6I5pPBBiI81LBx4Icn1KfXLx4Ib_NA";
const SHEET_URL         = "https://opensheet.elk.sh/12gNBBNZpqbkVyKJBzEQUwF-HXu1moQjXBE7SyezUt8k/Sheet1";
const CLOUDINARY_CLOUD  = "dyt6iai2c";
const CLOUDINARY_PRESET = "CU_FEST_UPLOAD";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ══════════════════════════
   SPLASH
══════════════════════════ */
setTimeout(() => {
  const s = document.getElementById('splash');
  s.classList.add('hidden');
  setTimeout(() => s.style.display = 'none', 500);
}, 2200);

/* ══════════════════════════
   NAVIGATION
══════════════════════════ */
const navlessPages = ['teamDetail','venueDetail'];

function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (!navlessPages.includes(id)) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('nav-' + id);
    if (btn) btn.classList.add('active');
  }
}

/* ══════════════════════════
   UTILITY
══════════════════════════ */
function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showMsg(text, isError = false) {
  const m = document.getElementById('msg');
  if (!m) return;
  m.innerHTML = isError
    ? `<div class="error-msg">❌ ${escHtml(text)}</div>`
    : `<div class="success-msg">✅ ${escHtml(text)}</div>`;
}

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method:'POST', body:fd });
  const data = await res.json();
  if (!data.secure_url) throw new Error(data.error?.message || 'Upload failed — check your Cloudinary preset name');
  return data.secure_url;
}

/* ══════════════════════════
   LOGO
   Supabase table needed:
   settings (id text PK, value text)
══════════════════════════ */
async function loadLogo() {
  try {
    const { data } = await sb.from('settings').select('value').eq('id','CU-FEST.png').maybeSingle();
    if (data?.value) applyLogo(data.value);
  } catch(_) {}
}

function applyLogo(url) {
  document.getElementById('headerLogo').innerHTML = `<img src="${escHtml(url)}" alt="Logo">`;
  document.getElementById('splashLogo').innerHTML = `<img src="${escHtml(url)}" alt="Logo">`;
}

function previewLogo(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('logoPreviewBox').innerHTML = `<img src="${e.target.result}" alt="Preview">`;
  };
  reader.readAsDataURL(file);
}

async function uploadLogo() {
  const file = document.getElementById('logoFile').files[0];
  if (!file) { showMsg('Please select an image first', true); return; }
  document.getElementById('msg').innerHTML = '<div class="loading"><div class="spinner"></div>Uploading…</div>';
  try {
    const url = await uploadToCloudinary(file);
    const { error } = await sb.from('settings').upsert({ id: 'logo_url', value: url });
    if (error) throw new Error(error.message);
    applyLogo(url);
    showMsg('Logo updated! Appears in header and splash screen.');
  } catch(err) { showMsg(err.message, true); }

/* ══════════════════════════
   LEADERBOARD
══════════════════════════ */
let allTeams = [];

async function loadLeaderboard() {
  try {
    const res  = await fetch(SHEET_URL);
    const data = await res.json();
    const grouped = {};
    data.forEach(row => {
      const dept = (row.Department || '').trim();
      const pts  = parseInt(row.Points || 0);
      if (!dept) return;
      grouped[dept] = (grouped[dept] || 0) + pts;
    });
    allTeams = Object.entries(grouped)
      .map(([name, total]) => ({ name, total }))
      .sort((a, b) => b.total - a.total);
    renderBoard(allTeams);
  } catch(err) {
    document.getElementById('board').innerHTML =
      '<div class="empty"><div class="e-icon">⚠️</div>Could not load leaderboard</div>';
  }
}

function renderBoard(teams) {
  const board = document.getElementById('board');
  if (!teams.length) { board.innerHTML = '<div class="empty"><div class="e-icon">📊</div>No data yet</div>'; return; }

  const top3 = teams.slice(0, 3);
  const rest  = teams.slice(3);
  const podiumOrder = [top3[1], top3[0], top3[2]];
  const rankClasses = ['rank-2','rank-1','rank-3'];
  const rankNums    = [2, 1, 3];

  let podiumHTML = '<div class="podium">';
  podiumOrder.forEach((team, i) => {
    if (!team) { podiumHTML += '<div style="flex:1"></div>'; return; }
    const rn = rankNums[i], name = escHtml(team.name);
    podiumHTML += `
      <div class="podium-item ${rankClasses[i]}" onclick="openDetails(this.dataset.name)" data-name="${name}">
        ${rn === 1 ? '<div class="crown">👑</div>' : ''}
        <div class="avatar">${team.name.charAt(0).toUpperCase()}</div>
        <div class="podium-name">${name}</div>
        <div class="podium-pts">${team.total} pts</div>
        <div class="rank-num">${rn}</div>
      </div>`;
  });
  podiumHTML += '</div>';

  let listHTML = '';
  if (rest.length) {
    listHTML += '<div class="section-label">Rankings</div>';
    rest.forEach((team, i) => {
      const name = escHtml(team.name);
      listHTML += `
        <div class="list-card" onclick="openDetails(this.dataset.name)" data-name="${name}">
          <span class="rank-label">#${i + 4}</span>
          <span class="team-name">${name}</span>
          <span class="pts-badge">${team.total} pts</span>
        </div>`;
    });
  }
  board.innerHTML = podiumHTML + listHTML;
}

function searchTeam() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  renderBoard(q ? allTeams.filter(t => t.name.toLowerCase().includes(q)) : allTeams);
}

function openDetails(name) {
  fetch(SHEET_URL).then(r => r.json()).then(data => {
    const filtered = data.filter(d => (d.Department || '').trim() === name);
    let total = 0, html = '';
    filtered.forEach(item => {
      const pts = parseInt(item.Points || 0);
      total += pts;
      html += `<div class="detail-row"><span class="cat">${escHtml(item.Category || 'Unnamed')}</span><span class="pts">${pts} pts</span></div>`;
    });
    if (!html) html = '<div class="empty"><div class="e-icon">📂</div>No category data found</div>';
    document.getElementById('detailName').textContent   = name;
    document.getElementById('detailPoints').textContent = total;
    document.getElementById('categoryList').innerHTML   = html;
    show('teamDetail');
  }).catch(() => alert('Could not load team details'));
}

loadLeaderboard();
setInterval(loadLeaderboard, 10000);

`).join('');

/* ══════════════════════════
   MEDIA HIGHLIGHTS
   Stored in settings table as JSON array of Cloudinary URLs
   Row: { id: 'media_urls', value: '["url1","url2",...]' }
   No separate media table required.
══════════════════════════ */
async function loadMedia() {
  try {
    const { data } = await sb.from('settings').select('value').eq('id','media_urls').maybeSingle();
    renderMedia(data?.value ? JSON.parse(data.value) : []);
  } catch(_) { renderMedia([]); }
}

function renderMedia(urls) {
  const grid = document.getElementById('media');
  if (!urls.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:span 2"><div class="e-icon">🎬</div>No highlights yet</div>';
    return;
  }
  grid.innerHTML = urls.map(url =>
    `<div class="media-item"><img src="${escHtml(url)}" loading="lazy" alt="highlight"></div>`
  ).join('');
}

async function saveMediaUrls(urls) {
  await sb.from('settings').upsert({ id: 'media_urls', value: JSON.stringify(urls) });
}

/* ══════════════════════════
   ADMIN — Login / Logout
══════════════════════════ */
async function handleLogin() {
  const u   = document.getElementById('adminUser').value.trim();
  const p   = document.getElementById('adminPass').value;
  const err = document.getElementById('loginErr');
  if (!u || !p) { err.textContent = 'Enter username & password'; return; }
  err.textContent = 'Checking…';
  try {
    const { data, error } = await sb.from('admins').select('id').eq('Name', u).eq('Pass', p)
    if (error) { err.textContent = '❌ ' + error.message; return; }
    if (data?.length) {
      sessionStorage.setItem('cu_admin', u);
      document.getElementById('loginBox').style.display   = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      document.getElementById('welcomeMsg').textContent   = `Welcome, ${u} 👋`;
      err.textContent = '';
    } else {
      err.textContent = '❌ Wrong username or password';
    }
  } catch(e) { err.textContent = '❌ ' + e.message; }
}


function logout() {
  sessionStorage.removeItem('cu_admin');
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginBox').style.display   = 'block';
  document.getElementById('adminUser').value = '';
  document.getElementById('adminPass').value = '';
  document.getElementById('adminContent').innerHTML = '';
}

// Restore session on reload
(function() {
  const saved = sessionStorage.getItem('cu_admin');
  if (saved) {
    document.getElementById('loginBox').style.display   = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    document.getElementById('welcomeMsg').textContent   = `Welcome, ${saved} 👋`;
  }
})();

   ADMIN — Sections
══════════════════════════ */

  if (type === 'logo') {
    c.innerHTML = `
      <div class="admin-section-title">🖼️ Upload Festival Logo</div>
      <div class="logo-preview-wrap">
        <div class="logo-preview-box" id="logoPreviewBox">🖼️</div>
        <div class="logo-preview-info">
          Appears in the header &amp; splash screen.<br>
          Square images work best (200×200 px).<br>
          Supported: JPG, PNG, WebP.
        </div>
      </div>
      <div class="admin-form">
        <input type="file" id="logoFile" accept="image/*" onchange="previewLogo(this)">
        <button class="btn" onclick="uploadLogo()">Upload Logo</button>
        <div id="msg"></div>
      </div>`;
    const cur = document.getElementById('headerLogo').querySelector('img');
    if (cur) document.getElementById('logoPreviewBox').innerHTML = `<img src="${cur.src}" alt="Current logo">`;
  }

  else if (type === 'venues') {
    c.innerHTML = `
      <div class="admin-section-title">📍 Add Venue</div>
      <div class="admin-form">
        <input id="vname" placeholder="Venue name">
        <textarea id="vinfo" placeholder="Venue details / directions…"></textarea>
        <button class="btn" onclick="addVenue()">Add Venue</button>
        <div id="msg"></div>
      </div>`;
  }

  else if (type === 'media') {
    c.innerHTML = `
      <div class="admin-section-title">🎬 Upload Highlight Photo</div>
      <div class="admin-form">
        <input type="file" id="mediaFile" accept="image/*">
        <button class="btn" onclick="uploadMedia()">Upload Photo</button>
        <div id="msg"></div>
      </div>`;
  }

  else if (type === 'winners') {
    c.innerHTML = `
      <div class="admin-section-title">🏆 Add Winner</div>
      <div class="admin-form">
        <input id="winnerName"  placeholder="Winner / Team name">
        <input id="winnerEvent" placeholder="Event name (optional)">
        <button class="btn" onclick="addWinner()">Add Winner</button>
        <div id="msg"></div>
      </div>`;
  }

  else if (type === 'admins') {
    c.innerHTML = `
      <div class="admin-section-title">👤 Add Admin</div>
      <div class="admin-form">
        <input id="newAdmin" placeholder="Admin name" autocomplete="off">
        <input id="newPass"  type="password" placeholder="Password" autocomplete="off">
        <button class="btn" onclick="addAdmin()">Add Admin</button>
        <div id="msg"></div>
      </div>`;
  }

  else if (type === 'deleteWinner') {
    c.innerHTML = `
      <div class="admin-section-title">🗑️ Delete Winner</div>
      <div id="deleteWinnerList"><div class="loading"><div class="spinner"></div>Loading…</div></div>
      <div id="msg"></div>`;
    loadDeleteWinnerList();
  }

  c.scrollIntoView({ behavior: 'smooth' });
}

/* ── Upload highlight (Cloudinary → stored as JSON in settings) ── */
async function uploadMedia() {
  const file = document.getElementById('mediaFile').files[0];
  if (!file) { showMsg('Please select an image first', true); return; }
  document.getElementById('msg').innerHTML = '<div class="loading"><div class="spinner"></div>Uploading…</div>';
  try {
    const url = await uploadToCloudinary(file);
    const { data } = await sb.from('settings').select('value').eq('id','media_urls').maybeSingle();
    const existing = data?.value ? JSON.parse(data.value) : [];
    existing.unshift(url);
    await saveMediaUrls(existing);
    showMsg('Photo uploaded successfully!');
    document.getElementById('mediaFile').value = '';
    loadMedia();
  } catch(err) { showMsg(err.message, true); }
}

/* ── Add Venue ── */
async function addVenue() {
  const name = document.getElementById('vname').value.trim();
  const info = document.getElementById('vinfo').value.trim();
  if (!name) { showMsg('Enter venue name', true); return; }
  try {
    const { error } = await sb.from('venues').insert([{
  "Venue": name,
  "Event Details": info,
  "Timings": ""
}]);
    if (error) throw new Error(error.message);
    showMsg('Venue added successfully');
    document.getElementById('vname').value = '';
    document.getElementById('vinfo').value = '';
    loadVenues();
  } catch(err) { showMsg(err.message, true); }
}

/* ── Add Winner ── */
async function addWinner() {
  const name  = document.getElementById('winnerName').value.trim();
  const event = document.getElementById('winnerEvent').value.trim();
  if (!name) { showMsg('Enter winner name', true); return; }
  try {
    const { error } = await sb.from('winners').insert([{
  "Name": name,
  "UID": "",
  "Department": "",
  "Category": event,
  "Position": ""
}]);
    if (error) throw new Error(error.message);
    showMsg('Winner added successfully');
    document.getElementById('winnerName').value  = '';
    document.getElementById('winnerEvent').value = '';
    loadWinners();
  } catch(err) { showMsg(err.message, true); }
}

/* ── Delete Winner ── */
async function loadDeleteWinnerList() {
  const { data, error } = await sb.from('winners').select('*').order('created_at', { ascending: true });
  const list = document.getElementById('deleteWinnerList');
  if (error || !data?.length) { list.innerHTML = '<div class="empty">No winners to delete</div>'; return; }
  list.innerHTML = data.map((w, i) => `
    <div class="list-card" style="margin-bottom:8px;">
      <span class="rank-label">${medals[i] || '🎖️'}</span>
      <span class="team-name">${escHtml(w["Name"])}${w.event ? ` — ${escHtml(w.event)}` : ''}</span>
      <button class="btn btn-danger" style="width:auto;padding:4px 12px;font-size:12px;margin:0;"
              onclick="deleteWinner(${w.id})">Delete</button>
    </div>`).join('');
}

async function deleteWinner(id) {
  if (!confirm('Delete this winner?')) return;
  try {
    const { error } = await sb.from('winners').delete().eq('id', id);
    if (error) throw new Error(error.message);
    loadWinners();
    loadDeleteWinnerList();
    showMsg('Winner deleted');
  } catch(err) { showMsg(err.message, true); }
}

/* ── Add Admin ── */
async function addAdmin() {
  const name = document.getElementById('newAdmin').value.trim();
  const pass = document.getElementById('newPass').value.trim();
  if (!name || !pass) { showMsg('Fill all fields', true); return; }
  try {
    const { error } = await sb.from('admins').insert([{ Name: name, Pass: pass }]);
    if (error) throw new Error(error.message);
    showMsg('Admin added successfully');
    document.getElementById('newAdmin').value = '';
    document.getElementById('newPass').value  = '';
  } catch(err) { showMsg(err.message, true); }
}
