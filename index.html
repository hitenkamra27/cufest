<!-- ULTRA MINIMAL PRO SPLASH -->
<div id="splash-screen">
  <style>
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(120deg, #ffffff, #f8fafc, #ffffff);
      background-size: 300% 300%;
      animation: bgMove 12s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Poppins', sans-serif;
      overflow: hidden;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* FLOATING GLASS BLOBS */
    .blob {
      position: absolute;
      width: 250px;
      height: 250px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      filter: blur(60px);
      animation: moveBlob 18s infinite alternate ease-in-out;
    }

    .blob:nth-child(1) { top: 10%; left: 10%; }
    .blob:nth-child(2) { bottom: 10%; right: 10%; }

    @keyframes moveBlob {
      from { transform: translate(0,0); }
      to { transform: translate(80px, -60px); }
    }

    .glass-box {
      position: relative;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0,0,0,0.05);
      padding: 40px 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .logo {
      width: 130px;
      opacity: 0;
      animation: fadeIn 1.2s forwards;
    }

    .title {
      color: #111;
      font-size: 22px;
      margin-top: 15px;
      font-weight: 600;
    }

    .subtitle {
      color: #777;
      font-size: 12px;
      margin-top: 5px;
    }

    .enter-btn {
      position: relative;
      overflow: hidden;
      margin-top: 25px;
      padding: 12px 26px;
      border-radius: 30px;
      border: 1px solid #e5e7eb;
      background: #111;
      color: white;
      font-size: 13px;
      cursor: pointer;
    }

    /* RIPPLE EFFECT */
    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      background: rgba(255,255,255,0.6);
      animation: rippleAnim 0.6s linear;
    }

    @keyframes rippleAnim {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>

  <!-- BLOBS -->
  <div class="blob"></div>
  <div class="blob"></div>

  <div class="glass-box">
    <img src="./logo.png" class="logo">

    <div class="title">CU FEST</div>
    <div class="subtitle">CU FEST LIVE SCORES AND WINNERS</div>

    <button class="enter-btn" onclick="enterApp(event)">Enter</button>
  </div>
</div>

<!-- SOUND -->
<audio id="introSound" src="intro.mp3" preload="auto"></audio>

<script>
  function createRipple(e) {
    const btn = e.currentTarget;
    const circle = document.createElement("span");
    const diameter = Math.max(btn.clientWidth, btn.clientHeight);
    const radius = diameter / 2;

    circle.style.width = circle.style.height = diameter + "px";
    circle.style.left = e.offsetX - radius + "px";
    circle.style.top = e.offsetY - radius + "px";
    circle.classList.add("ripple");

    const ripple = btn.getElementsByClassName("ripple")[0];
    if (ripple) {
      ripple.remove();
    }

    btn.appendChild(circle);
  }

  function enterApp(e){
    createRipple(e);

    const sound = document.getElementById("introSound");
    sound.play();

    e.target.innerText = "Opening...";

    setTimeout(()=>{
      const splash = document.getElementById("splash-screen");
      splash.style.opacity = "0";
      splash.style.transition = "0.5s";

      setTimeout(()=>{
        splash.style.display = "none";
      },500);
    },800);
  }
</script>
<!-- END -->
