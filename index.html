<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CU FEST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Poppins',sans-serif;
  background:#000;
  display:flex;
  justify-content:center;
}

/* MOBILE FRAME */
.app{
  width:100%;
  max-width:420px;
  height:100vh;
  background:#fff;
  position:relative;
  overflow:hidden;
}

/* SPLASH */
#splash{
  position:absolute;
  width:100%;
  height:100%;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

.glass{
  text-align:center;
}

.logo{width:120px;}

.btn{
  margin-top:20px;
  padding:12px 24px;
  border-radius:30px;
  background:#000;
  color:#fff;
  border:none;
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  font-weight:600;
  border-bottom:1px solid #eee;
}

/* CONTENT */
.page{
  display:none;
  padding:15px;
  height:calc(100vh - 120px);
  overflow:auto;
}

.active{display:block;}

/* CARDS */
.card{
  background:#f5f5f5;
  padding:15px;
  margin-bottom:10px;
  border-radius:12px;
}

/* LEADERBOARD */
.rank1{background:#000;color:#fff;}
.rank2{background:#333;color:#fff;}
.rank3{background:#555;color:#fff;}

/* NAVBAR */
.nav{
  position:absolute;
  bottom:0;
  width:100%;
  height:60px;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
}

.nav button{
  flex:1;
  border:none;
  background:none;
  font-size:10px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:1px solid #ddd;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="app">

<!-- SPLASH -->
<div id="splash">
  <div class="glass">
    <img src="CU-FEST.png" class="logo">
    <h3>CU FEST</h3>
    <button class="btn" onclick="enterApp()">Enter</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">CU FEST</div>

<!-- PAGES -->

<div id="leaderboard" class="page active">
  <h3>🏆 Leaderboard</h3>
  <div id="board"></div>
</div>

<div id="venues" class="page">
  <h3>📍 Venues</h3>
  <div class="card">Main Stage</div>
  <div class="card">Auditorium</div>
</div>

<div id="gallery" class="page">
  <h3>📸 Photos</h3>
  <div class="card">Add images here</div>
</div>

<div id="videos" class="page">
  <h3>🎥 Videos</h3>
  <div class="card">Add videos here</div>
</div>

<div id="winners" class="page">
  <h3>🥇 Winners</h3>
  <div class="card">Winner data</div>
</div>

<div id="admin" class="page">
  <h3>⚙️ Admin</h3>
  <input id="team" placeholder="Team Name">
  <input id="score" type="number" placeholder="Score">
  <button class="btn" onclick="addScore()">Update Score</button>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('leaderboard')">🏆</button>
  <button onclick="show('venues')">📍</button>
  <button onclick="show('gallery')">📸</button>
  <button onclick="show('videos')">🎥</button>
  <button onclick="show('winners')">🥇</button>
  <button onclick="show('admin')">⚙️</button>
</div>

</div>

<audio id="sound" src="intro.mp3"></audio>

<script>
/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ENTER */
function enterApp(){
  document.getElementById("sound").play();
  document.getElementById("splash").style.display="none";
  loadBoard();
}

/* NAVIGATION */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* LEADERBOARD */
function loadBoard(){
  db.collection("teams").onSnapshot(snapshot=>{
    let board=document.getElementById("board");
    board.innerHTML="";
    let teams=[];

    snapshot.forEach(doc=>teams.push(doc.data()));
    teams.sort((a,b)=>b.score-a.score);

    teams.forEach((t,i)=>{
      let cls="";
      if(i==0) cls="rank1";
      else if(i==1) cls="rank2";
      else if(i==2) cls="rank3";

      board.innerHTML+=`
        <div class="card ${cls}">
          #${i+1} ${t.name}<br>Score: ${t.score}
        </div>`;
    });
  });
}

/* ADMIN */
function addScore(){
  let t=document.getElementById("team").value;
  let s=parseInt(document.getElementById("score").value);

  db.collection("teams").doc(t).set({
    name:t,
    score:s
  });
}
</script>

</body>
</html>
